name: Stoa
options:
  bundleIdPrefix: com.stoa
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Stoa:
    type: application
    platform: iOS
    sources:
      - path: Stoa
      - path: Shared
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: Stoa
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        CODE_SIGN_ENTITLEMENTS: Stoa/Stoa.entitlements
    entitlements:
      path: Stoa/Stoa.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.stoa.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.stoa.shared
    scheme:
      testTargets: []

  StoaShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StoaShareExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: StoaShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: StoaShareExtension/StoaShareExtension.entitlements
    entitlements:
      path: StoaShareExtension/StoaShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.stoa.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.stoa.shared
    dependencies:
      - target: Stoa
        embed: false

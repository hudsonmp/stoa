<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #fff;
    }
    .header .subtitle {
      font-size: 11px;
      color: #888;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.saved { background: rgba(76, 175, 80, 0.15); color: #4CAF50; }
    .status.unsaved { background: rgba(255, 152, 0, 0.15); color: #FF9800; }

    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #555;
    }
    .tags-input {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      min-height: 36px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .tag .remove {
      cursor: pointer;
      opacity: 0.7;
    }
    .tag .remove:hover { opacity: 1; }
    .tags-input input {
      border: none;
      background: none;
      flex: 1;
      min-width: 60px;
      padding: 2px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    .btn-primary {
      background: #6366f1;
      color: #fff;
    }
    .btn-secondary {
      background: #222;
      color: #ccc;
    }
    .btn-tabgroup {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #aaa;
      font-size: 12px;
    }

    .setup {
      text-align: center;
      padding: 20px 0;
    }
    .setup input {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>STOA</h1>
    <span class="subtitle">Milieu Curation</span>
  </div>

  <div id="setup-view" class="setup" style="display:none">
    <p style="margin-bottom:12px; font-size:13px; color:#888;">Enter your Stoa user ID to get started</p>
    <input type="text" id="user-id-input" placeholder="User ID" />
    <button class="btn-primary" style="width:100%" id="save-user-btn">Connect</button>
  </div>

  <div id="main-view" style="display:none">
    <div id="status" class="status unsaved">Not saved</div>

    <div class="form-group">
      <label>Type</label>
      <select id="type-select">
        <option value="blog">Blog</option>
        <option value="paper">Paper</option>
        <option value="book">Book</option>
        <option value="podcast">Podcast</option>
        <option value="video">Video</option>
        <option value="tweet">Tweet</option>
        <option value="page">Page</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tags</label>
      <div class="tags-input" id="tags-container">
        <input type="text" id="tag-input" placeholder="Add tag (#syntax)" />
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="save-btn">Save Page</button>
      <button class="btn-secondary" id="open-btn">Open Stoa</button>
    </div>

    <button class="btn-tabgroup" id="tabgroup-btn">Save Tab Group</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

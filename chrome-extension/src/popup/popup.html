<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAFAF7;
      color: #1C1917;
      padding: 20px;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #E7E5E4;
    }
    .header-left {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .header h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 20px;
      font-weight: 600;
      color: #1C1917;
      letter-spacing: 0.3px;
    }
    .header .subtitle {
      font-size: 11px;
      color: #A8A29E;
      font-weight: 400;
    }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #A8A29E;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .settings-btn:hover {
      color: #78716C;
      background: #F3F1EC;
    }

    /* --- Status Banner --- */
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .status.unsaved {
      background: #FFF7ED;
      color: #C2410C;
      border: 1px solid #FED7AA;
    }
    .status.saved {
      background: #F0FDF4;
      color: #15803D;
      border: 1px solid #BBF7D0;
    }
    .status.saving {
      background: #FFF7ED;
      color: #C2410C;
      border: 1px solid #FED7AA;
    }
    .status a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .status a:hover {
      opacity: 0.8;
    }

    /* --- Page Title --- */
    .page-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 15px;
      font-weight: 400;
      color: #44403C;
      margin-bottom: 14px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* --- Form --- */
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #78716C;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      font-weight: 500;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #E7E5E4;
      border-radius: 6px;
      background: white;
      color: #1C1917;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type="text"]:focus {
      border-color: #C2410C;
      box-shadow: 0 0 0 2px rgba(194,65,12,0.08);
    }

    /* --- Tags --- */
    .tags-input {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px;
      border: 1px solid #E7E5E4;
      border-radius: 6px;
      background: white;
      min-height: 36px;
      cursor: text;
      transition: border-color 0.15s;
    }
    .tags-input:focus-within {
      border-color: #C2410C;
      box-shadow: 0 0 0 2px rgba(194,65,12,0.08);
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #FFF7ED;
      color: #C2410C;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #FED7AA;
    }
    .tag .remove {
      cursor: pointer;
      opacity: 0.6;
      font-size: 14px;
      line-height: 1;
    }
    .tag .remove:hover { opacity: 1; }
    .tags-input input {
      border: none;
      background: none;
      flex: 1;
      min-width: 60px;
      padding: 2px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: #1C1917;
      outline: none;
    }

    /* --- Tag Autocomplete --- */
    .tag-suggestions {
      position: absolute;
      left: 20px;
      right: 20px;
      background: white;
      border: 1px solid #E7E5E4;
      border-radius: 6px;
      box-shadow: 0 4px 12px rgba(28,25,23,0.08);
      max-height: 120px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }
    .tag-suggestions.visible { display: block; }
    .tag-suggestion {
      padding: 6px 10px;
      font-size: 12px;
      color: #44403C;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .tag-suggestion:hover,
    .tag-suggestion.active {
      background: #FFF7ED;
      color: #C2410C;
    }

    /* --- Buttons --- */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #C2410C;
      color: white;
    }
    .btn-primary:hover {
      background: #9A3412;
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      background: #D6D3D1;
      cursor: default;
    }
    .btn-secondary {
      flex: 1;
      padding: 10px;
      border: 1px solid #E7E5E4;
      border-radius: 6px;
      background: white;
      color: #78716C;
    }
    .btn-secondary:hover {
      background: #F3F1EC;
      color: #1C1917;
    }
    .btn-tabgroup {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: white;
      border: 1px solid #E7E5E4;
      border-radius: 6px;
      color: #A8A29E;
      font-size: 12px;
    }
    .btn-tabgroup:hover {
      background: #F3F1EC;
      color: #78716C;
    }

    /* --- Setup View --- */
    .setup {
      text-align: center;
      padding: 20px 0;
    }
    .setup p {
      font-size: 13px;
      color: #78716C;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .setup input {
      margin-bottom: 8px;
    }
    .setup .btn-primary {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>Stoa</h1>
      <span class="subtitle">Milieu Curation</span>
    </div>
    <button class="settings-btn" id="settings-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M13.5 8a5.5 5.5 0 0 0-.1-.8l1.3-1-1.2-2-1.5.5a5.5 5.5 0 0 0-1.4-.8L10.2 2H7.8l-.4 1.9a5.5 5.5 0 0 0-1.4.8l-1.5-.5-1.2 2 1.3 1A5.5 5.5 0 0 0 4.5 8c0 .3 0 .5.1.8l-1.3 1 1.2 2 1.5-.5c.4.3.9.6 1.4.8l.4 1.9h2.4l.4-1.9c.5-.2 1-.5 1.4-.8l1.5.5 1.2-2-1.3-1c.1-.3.1-.5.1-.8z"/>
      </svg>
    </button>
  </div>

  <!-- Setup View -->
  <div id="setup-view" class="setup" style="display:none">
    <p>Enter your Stoa user ID to get started</p>
    <input type="text" id="user-id-input" placeholder="User ID" />
    <button class="btn-primary" id="save-user-btn">Connect</button>
  </div>

  <!-- Main View -->
  <div id="main-view" style="display:none">
    <div id="status" class="status unsaved">Not saved</div>

    <div id="page-title" class="page-title"></div>

    <div class="form-group">
      <label>Type</label>
      <select id="type-select">
        <option value="blog">Blog</option>
        <option value="paper">Paper</option>
        <option value="book">Book</option>
        <option value="podcast">Podcast</option>
        <option value="video">Video</option>
        <option value="tweet">Tweet</option>
        <option value="page">Page</option>
      </select>
    </div>

    <div class="form-group" style="position:relative">
      <label>Tags</label>
      <div class="tags-input" id="tags-container">
        <input type="text" id="tag-input" placeholder="Add tag..." />
      </div>
      <div class="tag-suggestions" id="tag-suggestions"></div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="save-btn">Save Page</button>
      <button class="btn-secondary" id="open-btn">Open Stoa</button>
    </div>

    <button class="btn-tabgroup" id="tabgroup-btn">Save Tab Group</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
